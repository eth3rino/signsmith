<header class="header">
    <nav class="nav desktop">
        <a routerLink="." fragment="hero" class="logo">sign<span class="accent">smith</span></a>
        <a routerLink="." fragment="servicios" [class.visible]="this.currentFragment() == 'servicios'" class="servicios link">servicios</a>
        <a routerLink="." fragment="trabajos" [class.visible]="this.currentFragment() == 'trabajos'" class="trabajos link">trabajos</a>
        <a routerLink="." fragment="nosotros" [class.visible]="this.currentFragment() == 'nosotros'" class="nosotros link">nosotros</a>
        <a routerLink="." fragment="contacto" [class.visible]="this.currentFragment() == 'contacto'" class="contacto link">contactanos</a>
    </nav>

    <nav class="nav mobile">
        <div class="header-top">
            <a routerLink="/" class="logo">sign<span class="accent">smith</span></a>
            <button type="button" class="menu-toggle" (click)="toggleNav()" aria-label="open navigation menu"><svg lucideMenu></svg></button>
        </div>
        
        
    </nav>
</header>
@if (isNavOpen()) {
    <div class="nav-menu-container" animate.leave="nav-leave-animation" (click)="onWrapperClick($event)">
        <div class="nav-menu">
            <button class="close-nav" (click)="toggleNav()" aria-label="close navigation menu"><svg lucideX></svg></button>
            <a routerLink="." fragment="servicios" (click)="toggleNav()" class="link">servicios</a>
            <a routerLink="." fragment="trabajos" (click)="toggleNav()" class="link">trabajos</a>
            <a routerLink="." fragment="nosotros" (click)="toggleNav()" class="link">nosotros</a>
            <a routerLink="." fragment="contacto" (click)="toggleNav()" class="link">contactanos</a>
            <div class="nav-footer">
                <span class="footer-location">Buenos Aires, AR</span>
                <a href="" class="footer-link" aria-label="whatsapp contact">WAPP:11 4404-8844</a>
                <a href="" class="footer-link" aria-label="instagram contact">ig:signsmithpublicidad</a>
                <a href="" class="footer-link" aria-label="email contact">elianmeaca@gmail.com</a>
            </div>
        </div>
    </div>
}
